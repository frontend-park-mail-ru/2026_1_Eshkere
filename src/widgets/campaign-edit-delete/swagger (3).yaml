basePath: /
definitions:
  dto.AdCampaignResponse:
    properties:
      daily_budget:
        type: integer
      id:
        type: integer
      main_action:
        type: string
      name:
        type: string
      status:
        type: string
    type: object
  dto.AdGroupResponse:
    properties:
      age_from:
        type: integer
      age_to:
        type: integer
      gender:
        type: string
      id:
        type: integer
      name:
        type: string
      region_id:
        type: integer
      topic_id:
        type: integer
    type: object
  dto.AdResponse:
    properties:
      id:
        type: integer
      image_url:
        type: string
      short_desc:
        type: string
      status:
        type: string
      target_url:
        type: string
      title:
        type: string
    type: object
  dto.AdvertiserProfileResponse:
    properties:
      avatar_url:
        type: string
      balance:
        type: integer
      city:
        type: string
      company:
        type: string
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      name:
        type: string
      phone:
        type: string
      surname:
        type: string
      tariff:
        type: string
    type: object
  dto.AppealResponse:
    properties:
      category:
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      image_url:
        type: string
      status:
        type: string
      title:
        type: string
    type: object
  dto.BalanceResponse:
    properties:
      balance:
        type: integer
    type: object
  dto.CreateAdCampaignRequest:
    properties:
      main_action:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  dto.CreateAdCampaignResponse:
    properties:
      id:
        type: integer
    type: object
  dto.CreateAdGroupRequest:
    properties:
      age_from:
        type: integer
      age_to:
        type: integer
      gender:
        enum:
        - male
        - female
        - any
        type: string
      name:
        type: string
      region_id:
        type: integer
      topic_id:
        type: integer
    required:
    - age_from
    - age_to
    - gender
    - name
    - region_id
    - topic_id
    type: object
  dto.CreateAdGroupResponse:
    properties:
      id:
        type: integer
    type: object
  dto.CreateAdResponse:
    properties:
      id:
        type: integer
    type: object
  dto.CreateAppealResponse:
    properties:
      id:
        type: integer
    type: object
  dto.ListAdCampaignsResponse:
    properties:
      advertiser_id:
        type: integer
      campaigns:
        items:
          $ref: '#/definitions/dto.AdCampaignResponse'
        type: array
    type: object
  dto.ListAdGroupsResponse:
    properties:
      ad_campaign_id:
        type: integer
      groups:
        items:
          $ref: '#/definitions/dto.AdGroupResponse'
        type: array
    type: object
  dto.ListAdsResponse:
    properties:
      ads:
        items:
          $ref: '#/definitions/dto.AdResponse'
        type: array
      group_id:
        type: integer
    type: object
  dto.ListAppealsResponse:
    properties:
      advertiser_id:
        type: integer
      appeals:
        items:
          $ref: '#/definitions/dto.AppealResponse'
        type: array
    type: object
  dto.LoginRequest:
    properties:
      identifier:
        type: string
      password:
        type: string
    type: object
  dto.LoginResponse:
    properties:
      email:
        type: string
      id:
        type: integer
      phone:
        type: string
    type: object
  dto.RegisterRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        type: string
      phone:
        type: string
    type: object
  dto.RegisterResponse:
    properties:
      email:
        type: string
      id:
        type: integer
      phone:
        type: string
    type: object
  dto.TopUpBalanceRequest:
    properties:
      amount:
        type: integer
    type: object
  dto.UpdateAdCampaignRequest:
    properties:
      main_action:
        minLength: 1
        type: string
      name:
        minLength: 1
        type: string
      status:
        minLength: 1
        type: string
    type: object
  dto.UpdateAdGroupRequest:
    properties:
      age_from:
        minimum: 1
        type: integer
      age_to:
        minimum: 1
        type: integer
      gender:
        enum:
        - male
        - female
        - any
        minLength: 1
        type: string
      name:
        minLength: 1
        type: string
      region_id:
        minimum: 1
        type: integer
      topic_id:
        minimum: 1
        type: integer
    type: object
  dto.UpdateAdvertiserProfileRequest:
    properties:
      city:
        type: string
      company:
        type: string
      email:
        type: string
      name:
        type: string
      phone:
        type: string
      surname:
        type: string
      tariff:
        type: string
    type: object
  httpx.Error:
    properties:
      error:
        type: string
    type: object
  httpx.Success:
    properties:
      data: {}
    type: object
host: localhost:8000
info:
  contact: {}
  description: API для управления рекламодателями и их рекламными кампаниями.
  title: Eshke Reklama API
  version: "1.0"
paths:
  /ad_campaigns:
    get:
      description: Кампании рекламодателя из сессии
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ListAdCampaignsResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpx.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpx.Error'
      security:
      - CookieAuth: []
      summary: Список рекламных кампаний
      tags:
      - ad_campaigns
    post:
      consumes:
      - application/json
      description: Создаёт кампанию; рекламодатель определяется по сессии
      parameters:
      - description: Параметры кампании
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.CreateAdCampaignRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.CreateAdCampaignResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpx.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpx.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpx.Error'
      security:
      - CookieAuth: []
      summary: Создание рекламной кампании
      tags:
      - ad_campaigns
  /ad_campaigns/{ad_campaign_id}:
    delete:
      parameters:
      - description: ID кампании
        in: path
        name: ad_campaign_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpx.Success'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpx.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpx.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpx.Error'
      security:
      - CookieAuth: []
      summary: Удаление рекламной кампании
      tags:
      - ad_campaigns
    put:
      consumes:
      - application/json
      description: Частичное обновление полей кампании
      parameters:
      - description: ID кампании
        in: path
        name: ad_campaign_id
        required: true
        type: integer
      - description: Поля для обновления
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateAdCampaignRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpx.Success'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpx.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpx.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpx.Error'
      security:
      - CookieAuth: []
      summary: Обновление рекламной кампании
      tags:
      - ad_campaigns
  /ad_campaigns/{ad_campaign_id}/ad_groups:
    get:
      parameters:
      - description: ID рекламной кампании
        in: path
        name: ad_campaign_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ListAdGroupsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpx.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpx.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpx.Error'
      security:
      - CookieAuth: []
      summary: Список групп объявлений
      tags:
      - ad_groups
    post:
      consumes:
      - application/json
      parameters:
      - description: ID рекламной кампании
        in: path
        name: ad_campaign_id
        required: true
        type: integer
      - description: Параметры группы
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.CreateAdGroupRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.CreateAdGroupResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpx.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpx.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpx.Error'
      security:
      - CookieAuth: []
      summary: Создание группы объявлений
      tags:
      - ad_groups
  /ad_campaigns/{ad_campaign_id}/ad_groups/{ad_group_id}:
    delete:
      parameters:
      - description: ID рекламной кампании
        in: path
        name: ad_campaign_id
        required: true
        type: integer
      - description: ID группы
        in: path
        name: ad_group_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpx.Success'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpx.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpx.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpx.Error'
      security:
      - CookieAuth: []
      summary: Удаление группы объявлений
      tags:
      - ad_groups
    put:
      consumes:
      - application/json
      parameters:
      - description: ID рекламной кампании
        in: path
        name: ad_campaign_id
        required: true
        type: integer
      - description: ID группы
        in: path
        name: ad_group_id
        required: true
        type: integer
      - description: Поля для обновления
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateAdGroupRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpx.Success'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpx.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpx.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpx.Error'
      security:
      - CookieAuth: []
      summary: Обновление группы объявлений
      tags:
      - ad_groups
  /ad_campaigns/{ad_campaign_id}/ad_groups/{ad_group_id}/ads:
    get:
      parameters:
      - description: ID рекламной кампании
        in: path
        name: ad_campaign_id
        required: true
        type: integer
      - description: ID группы объявлений
        in: path
        name: ad_group_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ListAdsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpx.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpx.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpx.Error'
      security:
      - CookieAuth: []
      summary: Список объявлений группы
      tags:
      - ads
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: ID рекламной кампании
        in: path
        name: ad_campaign_id
        required: true
        type: integer
      - description: ID группы объявлений
        in: path
        name: ad_group_id
        required: true
        type: integer
      - description: Заголовок объявления
        in: formData
        name: title
        required: true
        type: string
      - description: Короткое описание объявления
        in: formData
        name: short_desc
        required: true
        type: string
      - description: Целевой URL
        in: formData
        name: target_url
        required: true
        type: string
      - description: Изображение объявления
        in: formData
        name: image
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.CreateAdResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpx.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpx.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpx.Error'
      security:
      - CookieAuth: []
      summary: Создание объявления
      tags:
      - ads
  /ad_campaigns/{ad_campaign_id}/ad_groups/{ad_group_id}/ads/{ad_id}:
    delete:
      parameters:
      - description: ID рекламной кампании
        in: path
        name: ad_campaign_id
        required: true
        type: integer
      - description: ID группы объявлений
        in: path
        name: ad_group_id
        required: true
        type: integer
      - description: ID объявления
        in: path
        name: ad_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpx.Success'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpx.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpx.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpx.Error'
      security:
      - CookieAuth: []
      summary: Удаление объявления
      tags:
      - ads
    put:
      consumes:
      - multipart/form-data
      parameters:
      - description: ID рекламной кампании
        in: path
        name: ad_campaign_id
        required: true
        type: integer
      - description: ID группы объявлений
        in: path
        name: ad_group_id
        required: true
        type: integer
      - description: ID объявления
        in: path
        name: ad_id
        required: true
        type: integer
      - description: Новый заголовок объявления
        in: formData
        name: title
        type: string
      - description: Новый статус объявления
        enum:
        - turned_off
        - moderation
        - working
        - rejected
        - not_enough_money
        in: formData
        name: status
        type: string
      - description: Новое короткое описание объявления
        in: formData
        name: short_desc
        type: string
      - description: Новый целевой URL
        in: formData
        name: target_url
        type: string
      - description: Новое изображение объявления
        in: formData
        name: image
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpx.Success'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpx.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpx.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpx.Error'
      security:
      - CookieAuth: []
      summary: Обновление объявления
      tags:
      - ads
  /ad_campaigns/{ad_campaign_id}/feed:
    post:
      consumes:
      - application/json
      description: Генерирует уникальную feed-ссылку для рекламной кампании
      parameters:
      - description: ID рекламной кампании
        in: path
        name: ad_campaign_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpx.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpx.Error'
      summary: Создать feed-ссылку для кампании
      tags:
      - feed
  /advertisers/balance:
    get:
      description: Возвращает текущий баланс рекламодателя по сессии
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.BalanceResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpx.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpx.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpx.Error'
      security:
      - CookieAuth: []
      summary: Баланс рекламодателя
      tags:
      - advertiser
  /advertisers/balance/topup:
    post:
      consumes:
      - application/json
      description: Пополняет баланс текущего рекламодателя
      parameters:
      - description: Сумма пополнения
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.TopUpBalanceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.BalanceResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpx.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpx.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpx.Error'
      security:
      - CookieAuth: []
      summary: Пополнение баланса
      tags:
      - advertiser
  /advertisers/login:
    post:
      consumes:
      - application/json
      description: Аутентифицирует рекламодателя по email или телефону и паролю
      parameters:
      - description: Данные для входа
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.LoginResponse'
        "400":
          description: Invalid identifier или password
          schema:
            $ref: '#/definitions/httpx.Error'
        "401":
          description: Неверные учётные данные
          schema:
            $ref: '#/definitions/httpx.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpx.Error'
      summary: Вход рекламодателя
      tags:
      - advertiser
  /advertisers/logout:
    post:
      description: Завершает сессию текущего рекламодателя
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpx.Error'
      summary: Выход рекламодателя
      tags:
      - advertiser
  /advertisers/me:
    get:
      description: Возвращает данные текущего пользователя по сессии
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.AdvertiserProfileResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpx.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpx.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpx.Error'
      security:
      - CookieAuth: []
      summary: Профиль рекламодателя
      tags:
      - advertiser
    put:
      consumes:
      - application/json
      description: Обновляет данные текущего рекламодателя по сессии
      parameters:
      - description: Поля для обновления профиля
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateAdvertiserProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.AdvertiserProfileResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpx.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpx.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpx.Error'
      security:
      - CookieAuth: []
      summary: Обновление профиля рекламодателя
      tags:
      - advertiser
  /advertisers/me/avatar:
    put:
      consumes:
      - multipart/form-data
      description: Загружает JPEG, PNG или WEBP аватар текущего рекламодателя
      parameters:
      - description: Файл аватара
        in: formData
        name: avatar
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.AdvertiserProfileResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpx.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpx.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpx.Error'
      security:
      - CookieAuth: []
      summary: Обновление аватара рекламодателя
      tags:
      - advertiser
  /advertisers/register:
    post:
      consumes:
      - application/json
      description: Создает новый аккаунт и открывает сессию
      parameters:
      - description: Данные для регистрации
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.RegisterResponse'
        "400":
          description: Invalid request или User already exists
          schema:
            $ref: '#/definitions/httpx.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpx.Error'
      summary: Регистрация рекламодателя
      tags:
      - advertiser
  /appeals:
    get:
      description: Возвращает список обращений текущего рекламодателя
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ListAppealsResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpx.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpx.Error'
      security:
      - CookieAuth: []
      summary: Список обращений
      tags:
      - appeal
    post:
      consumes:
      - multipart/form-data
      description: Создает обращение в техподдержку. Можно передать optional скриншот
      parameters:
      - description: Категория обращения
        enum:
        - bug
        - suggestion
        - complaint
        - question
        in: formData
        name: category
        required: true
        type: string
      - description: Заголовок обращения
        in: formData
        name: title
        required: true
        type: string
      - description: Описание проблемы или вопроса
        in: formData
        name: description
        required: true
        type: string
      - description: Имя пользователя
        in: formData
        name: name
        required: true
        type: string
      - description: Email для обратной связи
        in: formData
        name: email
        required: true
        type: string
      - description: Скриншот проблемы
        in: formData
        name: screenshot
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.CreateAppealResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpx.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpx.Error'
      summary: Создание обращения
      tags:
      - appeal
  /appeals/{appeal_id}:
    get:
      description: Возвращает одно обращение текущего рекламодателя по id
      parameters:
      - description: ID обращения
        in: path
        name: appeal_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.AppealResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpx.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpx.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpx.Error'
      security:
      - CookieAuth: []
      summary: Получить обращение
      tags:
      - appeal
  /feed/{token}:
    get:
      description: Возвращает объявления по публичному feed-токену; при отсутствии
        объявлений возвращает пустой список
      parameters:
      - description: Feed-токен
        in: path
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpx.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpx.Error'
      summary: Публичный feed объявлений
      tags:
      - feed
securityDefinitions:
  CookieAuth:
    in: cookie
    name: session_id
    type: apiKey
