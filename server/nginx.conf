server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /js/ {
        expires 30d;
        add_header Cache-Control "public";
    }

    location /img/ {
        expires 30d;
        add_header Cache-Control "public";
    }

    location /icons/ {
        expires 30d;
        add_header Cache-Control "public";
    }

    location /fonts/ {
        expires 30d;
        add_header Cache-Control "public";
    }

    location = /manifest.json {
        add_header Cache-Control "public";
    }

    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
}
